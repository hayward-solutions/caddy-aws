name: Test

on:
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build image
        run: docker build -t caddy-aws:test .

      - name: Verify plugins
        run: |
          docker run --rm caddy-aws:test caddy list-modules | grep dns.providers.route53
          docker run --rm caddy-aws:test caddy list-modules | grep caddy.storage.s3

      - name: Verify Caddyfile syntax
        run: |
          docker run --rm \
            -e CADDY_EMAIL=test@example.com \
            -e CADDY_DOMAIN=example.com \
            -e CADDY_UPSTREAM=localhost:8080 \
            -e S3_BUCKET=test-bucket \
            caddy-aws:test caddy validate --config /etc/caddy/Caddyfile
